<div class="auth-shell">
  <mat-card class="auth-card">
    <div class="auth-logo">
      <mat-icon>satellite_alt</mat-icon>
    </div>
    <h1 class="auth-title">SmartOps Monitoring</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    <div *ngIf="error" class="error-banner">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <mat-icon matPrefix>email</mat-icon>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="form.get('email')?.hasError('email')">Invalid email</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" class="submit-btn" [disabled]="loading">
        <mat-spinner *ngIf="loading" diameter="18" class="btn-spinner"></mat-spinner>
        {{ loading ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <p class="switch-link">
      Don't have an account?
      <a routerLink="/auth/register">Register</a>
    </p>
  </mat-card>
</div>
