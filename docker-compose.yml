# Smart Ops Monitoring — full local stack
#
# Quick start:
#   cp .env.example .env          # edit passwords / secrets
#   docker compose up -d
#
# Services exposed on the host:
#   PostgreSQL (main)   → localhost:5432
#   PostgreSQL (hangfire) → localhost:5433
#   Redis               → localhost:6379
#   Elasticsearch       → http://localhost:9200   (user: elastic)
#   Kibana              → http://localhost:5601
#   API                 → http://localhost:8080/swagger

services:

  # ── PostgreSQL (application data) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: smartops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d smartops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── PostgreSQL (Hangfire storage) ────────────────────────────────────────
  postgres-hangfire:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: smartops_hangfire
    volumes:
      - postgres_hangfire_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d smartops_hangfire"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch ────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    restart: unless-stopped
    environment:
      - node.name=smartops-es
      - cluster.name=smartops-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false   # plain HTTP inside the Docker network
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          curl -s -f -u "elastic:${ELASTIC_PASSWORD:-changeme}" \
            http://localhost:9200/_cluster/health \
            | grep -q '"status":"green"\|"status":"yellow"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── One-time setup: set kibana_system password ───────────────────────────
  # This container runs once after Elasticsearch is healthy and exits.
  elasticsearch-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-changeme}
    command: >
      bash -c '
        echo "Setting kibana_system user password..." &&
        curl -s -o /dev/null -w "%{http_code}" \
          -X POST -u "elastic:$${ELASTIC_PASSWORD}" \
          -H "Content-Type: application/json" \
          http://elasticsearch:9200/_security/user/kibana_system/_password \
          -d "{\"password\":\"$${KIBANA_SYSTEM_PASSWORD}\"}" &&
        echo "" &&
        echo "kibana_system password updated successfully."
      '

  # ── Kibana ───────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    restart: unless-stopped
    depends_on:
      elasticsearch-setup:
        condition: service_completed_successfully
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-changeme}
      # Encryption keys (must be ≥ 32 chars each)
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4}
      - SERVER_NAME=kibana
    volumes:
      - kibana_data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -s http://localhost:5601/api/status | grep -q 'available'"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── .NET 8 API ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-hangfire:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=smartops;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - ConnectionStrings__HangfireConnection=Host=postgres-hangfire;Port=5432;Database=smartops_hangfire;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY:-REPLACE_WITH_STRONG_SECRET_KEY_AT_LEAST_32_CHARACTERS}
      - Jwt__Issuer=SmartOpsMonitoring
      - Jwt__Audience=SmartOpsMonitoringClients
      - Jwt__ExpiryHours=24
      - Serilog__MinimumLevel__Default=Information
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  postgres_hangfire_data:
  redis_data:
  elasticsearch_data:
  kibana_data:
